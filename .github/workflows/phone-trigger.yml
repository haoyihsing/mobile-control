name: Phone Trigger

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: "open-codex"
        type: choice
        options:
          - open-codex
          - status-check

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Run cloud action
        shell: bash
        run: |
          set -euo pipefail
          action='${{ inputs.action }}'
          echo "Requested action: ${action}"
          if [ "${action}" = "open-codex" ]; then
            echo "Cloud mode is active."
            echo "No local desktop app can be opened from GitHub-hosted runners."
            echo "Use this workflow for cloud tasks only."
          elif [ "${action}" = "status-check" ]; then
            echo "Cloud runner is online and accepted the job."
          else
            echo "Unknown action: ${action}"
            exit 1
          fi
