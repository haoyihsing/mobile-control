name: Phone Trigger

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: "open-codex"
        type: choice
        options:
          - open-codex
          - status-check

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Redirect to self-hosted workflow
        run: |
          echo "Requested action: ${{ inputs.action }}"
          echo "Use 'Phone Trigger Self Hosted' to run on your desktop runner."
