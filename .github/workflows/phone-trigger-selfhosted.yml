name: Phone Trigger Self Hosted

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: "open-codex"
        type: choice
        options:
          - open-codex
          - status-check

jobs:
  run-local:
    runs-on: self-hosted
    steps:
      - name: Run requested action
        shell: powershell
        run: |
          $action = "${{ inputs.action }}"
          Write-Host "Requested action: $action"

          switch ($action) {
            "open-codex" {
              $chrome = 'D:\Codex\chromium\chrome-win\chrome.exe'
              if (Test-Path $chrome) {
                Start-Process -WindowStyle Hidden $chrome
                Write-Host "Opened Chromium."
              } else {
                throw "Chromium not found at $chrome"
              }
            }
            "status-check" {
              Write-Host "Runner is online and accepted the job."
            }
            default {
              throw "Unknown action: $action"
            }
          }
