name: Phone Trigger Self Hosted

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: "open-codex"
        type: choice
        options:
          - open-codex
          - status-check

jobs:
  run-local:
    runs-on: self-hosted
    steps:
      - name: Run requested action
        shell: powershell
        run: |
          $action = '${{ inputs.action }}'
          Write-Host ('Requested action: ' + $action)
          if ($action -eq 'open-codex') {
            $candidatePaths = @(
              'C:\Program Files\WindowsApps\OpenAI.Codex_26.623.13972.0_x64__2p2nqsd0c76g0\app\Codex.exe',
              'C:\Program Files\WindowsApps\OpenAI.Codex_26.623.13972.0_x64__2p2nqsd0c76g0\Codex.exe'
            )
            $launched = $false
            foreach ($path in $candidatePaths) {
              if (Test-Path $path) {
                Start-Process -FilePath $path
                Write-Host ('Opened Codex from ' + $path)
                $launched = $true
                break
              }
            }
            if (-not $launched) {
              $app = Get-StartApps | Where-Object { $_.Name -match 'Codex|ChatGPT' } | Select-Object -First 1
              if ($app) {
                Start-Process explorer.exe ('shell:AppsFolder\' + $app.AppID)
                Write-Host ('Opened app via Start menu entry: ' + $app.Name)
                $launched = $true
              }
            }
            if (-not $launched) {
              throw 'Could not locate a launchable Codex/ChatGPT app entry'
            }
          }
          elseif ($action -eq 'status-check') {
            Write-Host 'Runner is online and accepted the job.'
          }
          else {
            throw ('Unknown action: ' + $action)
          }
