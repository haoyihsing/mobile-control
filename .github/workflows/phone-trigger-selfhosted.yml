name: Phone Trigger Self Hosted

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to run"
        required: true
        default: "open-codex"
        type: choice
        options:
          - open-codex
          - status-check

jobs:
  run-local:
    runs-on: self-hosted
    steps:
      - name: Run requested action
        shell: cmd
        run: |
          @echo off
          set "ACTION=${{ inputs.action }}"
          powershell -NoProfile -ExecutionPolicy Bypass -Command ^
            "$action = $env:ACTION; ^
             Write-Host ('Requested action: ' + $action); ^
             switch ($action) { ^
               'open-codex' { ^
                 $codex = 'C:\Program Files\WindowsApps\OpenAI.Codex_26.623.13972.0_x64__2p2nqsd0c76g0\app\Codex.exe'; ^
                 if (Test-Path $codex) { ^
                   Start-Process -FilePath $codex; ^
                   Write-Host 'Opened Codex.' ^
                 } else { ^
                   throw ('Codex not found at ' + $codex) ^
                 } ^
               } ^
               'status-check' { ^
                 Write-Host 'Runner is online and accepted the job.' ^
               } ^
               default { ^
                 throw ('Unknown action: ' + $action) ^
               } ^
             }"
